<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SGM-ITP | Centro de Cómputo{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-tecnm { background-color: #1B396A !important; }
        .text-tecnm { color: #1B396A !important; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-tecnm shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'lista_equipos' %}">
                🏛️ SGM-ITP | Centro de Cómputo
            </a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'lista_equipos' %}">💻 Inventario</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'lista_reportes' %}">📋 Reportes de Falla</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'lista_mantenimientos' %}">🛠️ Mantenimientos</a>
                    </li>
                </ul>
                
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link fw-bold text-warning" href="/admin/" target="_blank">
                            ⚙️ Panel Admin
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <div class="container mt-5">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>9
